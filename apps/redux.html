<!DOCTYPE html>
<html>
    <head>
        <title>Redux VPN</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <style>
            body {
                background-color: coral;
            }
            .topBar {
                background-color: gray;
                padding: 10px;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .round {
                border-radius: 25px;
                padding: 10px;
                background-color: black;
                color: white;
            }
            .round:hover {
                cursor: pointer;
            }
            h1 {
                text-align: center;
                color: white;
                font-family: monospace;
            }
            p {
                text-align: center;
                color: white;
                font-family: monospace;
            }
            .checkedBad {
                color: red;
            }
            .checkedNt {
                color: yellow;
            }
            .checkedGood {
                color: green;
            }
            .unchecked {
                color: gray;
            }
            .reviews {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
            }
            .review {
                background-color: black;
                width: 200px;
            }
            .cnct {
                display: flex;
                justify-content: center;
                align-items: center;
            }
        </style>
    </head>
    <body>
        <div class="topBar">
            <button onclick="openTab('home')" class="round">Home</button>
            <button onclick="openTab('rvws')" class="round">Reviews</button>
            <button onclick="openTab('about')" class="round">About</button>
            <button onclick="openTab('demo')" class="round">Launch VPN</button>
        </div>

        <div class="content-wrapper">
            <div id="home" class="tab-content">
                <h1>Redux VPN</h1>
                <p>A VPN for the people.</p>
            </div>

            <div id="rvws" class="tab-content" style="display:none">
                <h1>Reviews</h1>

                <div class="reviews">
                    <div class="review">
                        <p>Matt Smith</p>
                        <span class="fa fa-star checkedGood"></span>
                        <span class="fa fa-star checkedGood"></span>
                        <span class="fa fa-star checkedGood"></span>
                        <span class="fa fa-star checkedGood"></span>
                        <span class="fa fa-star checkedGood"></span>
                        <p>Good VPN</p>
                    </div>
                    <div class="review">
                        <p>Daniel Wartz</p>
                        <span class="fa fa-star checkedNt"></span>
                        <span class="fa fa-star checkedNt"></span>
                        <span class="fa fa-star checkedNt"></span>
                        <span class="fa fa-star unchecked"></span>
                        <span class="fa fa-star unchecked"></span>
                        <p>Not a perfect VPN, But it does the job.</p>
                    </div>
                    <div class="review">
                        <p>Dave Sunny</p>
                        <span class="fa fa-star checkedBad"></span>
                        <span class="fa fa-star unchecked"></span>
                        <span class="fa fa-star unchecked"></span>
                        <span class="fa fa-star unchecked"></span>
                        <span class="fa fa-star unchecked"></span>
                        <p>I HATE THIS VPN</p>
                    </div>
                </div>
            </div>

            <div id="about" class="tab-content" style="display:none">
                <h1>About</h1>
                <p>Its just a VPN. nothing special.</p>
            </div>

            <div id="demo" class="tab-content" style="display:none">
                <h1>VPN</h1>
                <p id="connection">Disconnected.</p>
                <div class="cnct">
                    <button class="round" onclick="waitConnect()">Connect</button>
                    <button class="round" onclick="waitDisconnect()">Disconnect</button>
                </div>
            </div>
        </div>
    </body>
    <script>
        var cnt = 0;

        function openTab(tabName) {
            const tabs = document.querySelectorAll('.tab-content');

            tabs.forEach(tab => {
                tab.style.display = 'none';
            });
            document.getElementById(tabName).style.display = 'block';
        }

        function waitConnect() {
            if (cnt == 1) {
                alert("Your already connected!");
            } else {
                cnt = 1;
                document.getElementById('connection').innerHTML = "Connecting...";
                setTimeout(connect, 3000);
            }
        }

        function waitDisconnect() {
            if (cnt == 0) {
                alert("Your already disconnected!");
            } else {
                cnt = 0;
                document.getElementById('connection').innerHTML = "Disconnecting...";
                setTimeout(disconnect, 1000);
            }
        }

        function disconnect() {
            document.getElementById('connection').innerHTML = "Disconnected.";
        }

        function connect() {
            document.getElementById('connection').innerHTML = "Connected.";
        }
    </script>
</html>
